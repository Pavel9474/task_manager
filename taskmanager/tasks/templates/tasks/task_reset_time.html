{% extends 'base.html' %}

{% block title %}Сброс времени задачи{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning">
                <h3 class="mb-0">Сброс времени задачи</h3>
            </div>
            <div class="card-body">
                <p class="lead">Вы уверены, что хотите сбросить время для задачи "{{ task.title }}"?</p>
                
                <div class="alert alert-warning">
                    <strong>Внимание!</strong> Вся информация о времени начала и окончания будет удалена.
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'task_detail' task.id %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-warning">
                            Сбросить время
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
