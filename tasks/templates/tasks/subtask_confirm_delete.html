{% extends 'base.html' %}

{% block title %}Удаление этапа{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">Подтверждение удаления</h3>
            </div>
            <div class="card-body">
                <p class="lead">Вы уверены, что хотите удалить этап "{{ subtask.title }}"?</p>
                <p class="text-muted">Это действие нельзя будет отменить.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'subtask_list' subtask.task.id %}" class="btn btn-secondary">
                            Отмена
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Удалить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
