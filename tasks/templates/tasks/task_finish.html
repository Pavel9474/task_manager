{% extends 'base.html' %}

{% block title %}Завершение задачи{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Завершение задачи</h3>
            </div>
            <div class="card-body">
                <p class="lead">Вы хотите завершить задачу "{{ task.title }}"?</p>
                
                {% if task.start_time %}
                <p>Время начала: {{ task.start_time|date:"d.m.Y H:i" }}</p>
                {% endif %}
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'task_detail' task.id %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-lg"></i> Подтвердить завершение
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
